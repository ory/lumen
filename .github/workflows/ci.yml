name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Test
        run: make test

      - name: Vet
        run: go vet -tags=fts5 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --build-tags=fts5

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Wait for Ollama
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/ && break
            sleep 1
          done

      - name: Pull embedding model
        run:
          'curl -sf http://localhost:11434/api/pull -d ''{"name":"all-minilm"}'''

      - name: E2E tests
        run: make e2e
        env:
          OLLAMA_HOST: http://localhost:11434
          LUMEN_EMBED_MODEL: all-minilm
          LUMEN_EMBED_DIMS: '384'

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release
        run: |
          docker run --mount type=bind,source="$(pwd)",target=/project \
            --platform linux/amd64 \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            oryd/xgoreleaser:1.25.2-2.12.5 release --clean

